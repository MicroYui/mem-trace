[project]
name = "memtrace-sdk"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "memtrace",
    "pydantic>=2.9",
    "httpx>=0.27",
]

[project.optional-dependencies]
langgraph = ["langgraph>=0.2"]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
]

[project.scripts]
memtrace = "memtrace_sdk.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/memtrace_sdk"]
