# MemTrace horizontal-scaling load balancer (docker-compose.scale.yml).
# Round-robins across the `api` replicas started with `--scale api=N`.
#
# The `resolver` + variable `proxy_pass` forces per-request DNS resolution against
# Docker's embedded DNS (127.0.0.11), which returns the replica IPs round-robin —
# without it, nginx resolves `api` once at startup and pins to a single replica.
worker_processes auto;
events { worker_connections 1024; }

http {
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;

        location / {
            set $memtrace_api "http://api:8000";
            proxy_pass $memtrace_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 120s;
        }
    }
}
