services:
  postgres:
    # pgvector image is required for semantic (vector KNN) retrieval. Override
    # with MEMTRACE_PG_IMAGE only if you need a different registry mirror; a
    # plain Postgres image will fail the pgvector migration.
    image: ${MEMTRACE_PG_IMAGE:-pgvector/pgvector:pg16}
    container_name: memtrace-postgres
    environment:
      POSTGRES_USER: memtrace
      POSTGRES_PASSWORD: memtrace
      POSTGRES_DB: memtrace
    ports:
      - "5433:5432"
    volumes:
      - memtrace_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memtrace -d memtrace"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  memtrace_pgdata:
